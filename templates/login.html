<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Deep Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">

    <div class="auth-container">

        <header class="dashboard-header" style="text-align: center; margin-bottom: var(--space-lg);">
            <h1 class="headline-lg">🔐 Login</h1>
            <p class="subtitle">Access your development workspace</p>
        </header>

        {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" class="auth-form">
            <div class="form-group">
                <input
                    type="email"
                    name="email"
                    placeholder="Email"
                    required
                >
            </div>

            <div class="form-group">
                <input
                    type="password"
                    name="password"
                    placeholder="Password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: var(--space-sm);">
                Login
            </button>
        </form>

        <p class="auth-link body-md" style="text-align: center; margin-top: var(--space-lg);">
            Don't have an account yet? 
            <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Register</a>
        </p>

    </div>

</body>
</html>
