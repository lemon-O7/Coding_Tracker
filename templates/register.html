<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <h1>🚀 Track your Code</h1>

    <p class="auth-subtitle">
        Create your account
    </p>

    {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
    {% endif %}

    <form class="auth-form" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <p class="auth-link">
        Already have an account?
        <a href="/login">Login</a>
    </p>

</div>

</body>
